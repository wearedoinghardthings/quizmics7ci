<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Résultat — QuizAgent CI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563EB;--blue-d:#1D4ED8;--blue-x:#1E3A8A;
  --blue-l:#EFF6FF;--blue-m:#BFDBFE;
  --green:#059669;--orange:#D97706;--red:#DC2626;
  --bg:#F0F4FF;--surface:#fff;
  --border:#E2E8F4;--text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  --shadow-b:0 8px 32px rgba(37,99,235,.22);
}
html,body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
.wrap{max-width:600px;margin:0 auto;padding:0 16px 60px}

.score-card{
  background:linear-gradient(145deg,var(--blue-x) 0%,var(--blue-d) 50%,#3B82F6 100%);
  border-radius:22px;padding:44px 28px;text-align:center;
  margin:24px 0 20px;box-shadow:var(--shadow-b);
  position:relative;overflow:hidden;
}
.score-card::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.06)}
.sc-emoji{font-size:3.5rem;margin-bottom:10px;position:relative;z-index:1}
.sc-name{color:rgba(255,255,255,.75);font-size:.95rem;font-weight:500;margin-bottom:8px;position:relative;z-index:1}
.sc-val{color:#fff;font-size:3.2rem;font-weight:900;letter-spacing:-2px;position:relative;z-index:1}
.sc-pct{color:rgba(255,255,255,.88);font-size:1.7rem;font-weight:800;margin:3px 0 8px;position:relative;z-index:1}
.sc-quiz{color:rgba(255,255,255,.55);font-size:.88rem;position:relative;z-index:1}

.submitted-card{
  background:linear-gradient(135deg,var(--blue-l),#fff);
  border:2px solid var(--blue-m);border-radius:20px;
  padding:40px 28px;text-align:center;margin:24px 0 20px;
  box-shadow:var(--shadow);
}

.msg-card{
  border-radius:14px;padding:16px 18px;margin-bottom:16px;
  font-size:.95rem;font-weight:600;
}
.msg-success{background:#D1FAE5;color:#065F46;border:1.5px solid #6EE7B7}
.msg-info{background:var(--blue-l);color:var(--blue-d);border:1.5px solid var(--blue-m)}
.msg-warn{background:#FEF3C7;color:#92400E;border:1.5px solid #FCD34D}

.time-stamp{text-align:center;color:var(--text3);font-size:.82rem;margin:4px 0 20px}

.btn{
  width:100%;padding:16px;font-size:15px;font-family:'Inter',sans-serif;
  font-weight:700;border:none;border-radius:10px;cursor:pointer;
  min-height:52px;-webkit-tap-highlight-color:transparent;
}
.btn-primary{
  background:linear-gradient(135deg,var(--blue),var(--blue-d));
  color:#fff;box-shadow:0 4px 15px rgba(37,99,235,.4);
}
</style>
</head>
<body>
<div class="wrap">
  <div id="result-content"></div>
</div>

<script>
const result = JSON.parse(sessionStorage.getItem("qa_result") || "null");
if (!result) { window.location.href = "index.html"; }

const { score, max_score, show_score, agent_nom, agent_prenom, quiz_titre } = result;
const pct = max_score > 0 ? Math.round(score / max_score * 100) : 0;
const now = new Date().toLocaleDateString("fr-FR", { day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit" });

let html = "";

if (show_score) {
  const emoji = pct >= 80 ? "🏆" : pct >= 60 ? "👍" : "📚";
  const msg = pct >= 80
    ? { txt: "Excellent résultat ! Félicitations ! 🎉", cls: "msg-success" }
    : pct >= 60
    ? { txt: "Bon résultat. Continuez vos efforts !", cls: "msg-info" }
    : { txt: "Il faut encore travailler ce sujet. Courage !", cls: "msg-warn" };

  html = `
  <div class="score-card">
    <div class="sc-emoji">${emoji}</div>
    <p class="sc-name">${agent_nom} ${agent_prenom}</p>
    <p class="sc-val">${score.toFixed(1)} / ${max_score.toFixed(1)}</p>
    <p class="sc-pct">${pct} %</p>
    <p class="sc-quiz">${quiz_titre}</p>
  </div>
  <div class="msg-card ${msg.cls}">${msg.txt}</div>`;
} else {
  html = `
  <div class="submitted-card">
    <div style="font-size:2.8rem;margin-bottom:12px">✅</div>
    <div style="font-size:1.2rem;font-weight:800;color:var(--blue-x)">Réponses enregistrées</div>
    <div style="color:var(--text3);font-size:.9rem;margin-top:8px">${agent_nom} ${agent_prenom} · ${quiz_titre}</div>
  </div>`;
}

html += `
<p class="time-stamp">Soumis le ${now}</p>
<button class="btn btn-primary" onclick="goHome()">🏠  Retour à l'accueil</button>`;

document.getElementById("result-content").innerHTML = html;

function goHome() {
  sessionStorage.clear();
  window.location.href = "index.html";
}
</script>
</body>
</html>
